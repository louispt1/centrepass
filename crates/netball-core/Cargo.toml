[package]
name = "netball-core"
description = "Pure netball match statistics domain engine: event model, shorthand parser, validation, and stat derivation"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
serde = { version = "1.0.228", features = ["derive"] }
ts-rs = { version = "12.0.1", features = ["serde-compat"], optional = true }

[features]
# Derives ts-rs bindings on the boundary types so the web app's TypeScript
# types are generated from these Rust types (see web's `build:types` script).
# Off by default to keep the crate pure for normal builds (ADR-0002).
ts-bindings = ["dep:ts-rs"]

[dev-dependencies]
serde_json = "1.0.150"
